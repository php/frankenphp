---
version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    groups:
      go-modules:
        patterns:
          - "*"
    cooldown:
      default-days: 7
  - package-ecosystem: gomod
    directory: /caddy
    schedule:
      interval: weekly
    commit-message:
      prefix: chore(caddy)
    groups:
      go-modules:
        patterns:
          - "*"
    cooldown:
      default-days: 7
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7
  # Docker base images. Astral recommends keeping the supply chain
  # under continuous review; Dependabot opens a PR whenever a new base
  # image becomes available so we never silently fall behind security
  # patches.
  - package-ecosystem: docker
    directories:
      - /
      - /caddy
    schedule:
      interval: weekly
    commit-message:
      prefix: chore(docker)
    groups:
      docker:
        patterns:
          - "*"
    cooldown:
      default-days: 7
